name: create-release-on-master

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build_and_zip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create zip archives
        shell: bash
        run: |
          set -euo pipefail
          for dir in GIMP Krita coa_tools2 Photoshop Godot; do
            zip -r "${dir}.zip" "./${dir}"
          done
      - name: Upload zip artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-zips
          path: "*.zip"

  create_release:
    needs: build_and_zip
    runs-on: ubuntu-latest
    steps:
      - name: Download zip artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-zips
      - name: Generate release tag
        shell: bash
        run: |
          short_sha="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          echo "TAG=v2.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}_${short_sha}" >> "$GITHUB_ENV"
      - name: Create release draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          body: Automatic release from master branch
          draft: true
          prerelease: false
          files: |
            *.zip
