name: check-pr-source-master

on:
  pull_request:
    branches:
      - master

jobs:
  validate_source:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        shell: bash
        run: |
          source_branch="${{ github.head_ref }}"
          if [[ "${source_branch}" =~ ^(develop|hotfix-.+|codex/hotfix-.+)$ ]]; then
            exit 0
          fi
          echo "ERROR: master PR source '${source_branch}' is not allowed."
          echo "Allowed source branches: develop, hotfix-*, codex/hotfix-*"
          exit 1

  syntax_checks:
    needs: validate_source
    runs-on: ubuntu-latest
    strategy:
      matrix:
        script_path:
          - GIMP/coatools_exporter.py
          - Photoshop/BlenderExporter.jsx
          - coa_tools2/__init__.py
          - Krita/coa_tools2_exporter/__init__.py
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run syntax checks
        shell: bash
        run: |
          set -euo pipefail
          file="${{ matrix.script_path }}"
          case "${file##*.}" in
            py)
              python -m py_compile "$file"
              ;;
            jsx)
              # ExtendScript directives (for example "#target Photoshop") are not
              # valid JavaScript syntax for Node, so strip preprocessor lines first.
              # Some files include UTF-8 BOM, so remove BOM before filtering '#'.
              sed $'1s/^\xEF\xBB\xBF//;/^[[:space:]]*#/d' "$file" | node --check
              ;;
            *)
              echo "Unknown extension: $file"
              exit 1
              ;;
          esac
